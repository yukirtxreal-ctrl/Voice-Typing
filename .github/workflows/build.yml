name: Build Windows EXE

on:
  workflow_dispatch:        # lets you run it manually from the Actions tab
  push:
    tags:
      - "v*"               # e.g. push tag v1.0 to build + attach to a Release

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build VoiceTyping.exe
        run: >
          pyinstaller --noconfirm --clean --onefile --windowed
          --name VoiceTyping --icon app.ico
          --add-data "app.ico;." --add-data "logo.png;." --add-data "icon_small.png;."
          --collect-all customtkinter
          --collect-all faster_whisper
          --collect-all ctranslate2
          --collect-all speech_recognition
          --collect-all language_tool_python
          --collect-all pyaudio
          --collect-submodules keyboard
          voice_typing.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VoiceTyping-windows
          path: dist/VoiceTyping.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/VoiceTyping.exe
